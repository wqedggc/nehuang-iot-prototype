<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>涅凰智农 · 管理后台</title>
<link rel="stylesheet" href="app.css">
<script src="../version.js"></script>
</head>
<body>

<!-- ===== 侧边栏 ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h2>涅凰智农</h2>
    <span class="sidebar-subtitle">管理后台</span>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav">
    <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a class="nav-item" data-page="users" onclick="navigate('users')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>用户管理</span>
    </a>
    <a class="nav-item" data-page="gateways" onclick="navigate('gateways')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      <span>设备管理</span>
    </a>
    <a class="nav-item" data-page="bindings" onclick="navigate('bindings')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span>绑定管理</span>
    </a>
    <a class="nav-item" data-page="logs" onclick="navigate('logs')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>控制日志</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user" id="sidebar-user">
      <span class="sidebar-user-avatar" id="sidebar-user-avatar"></span>
      <div>
        <div class="sidebar-user-name" id="sidebar-user-name">管理员</div>
        <div class="sidebar-user-role" id="sidebar-user-role"></div>
      </div>
    </div>
    <button class="btn-icon" onclick="doLogout()" title="退出登录" aria-label="退出登录">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
  <div style="padding:8px 12px;font-size:10px;color:var(--color-text-muted);text-align:center;border-top:1px solid var(--color-border)">v<span id="app-version">?</span></div>
</aside>

<!-- ===== 主区域 ===== -->
<div class="main-area">
  <header class="topbar-admin">
    <h1 class="topbar-page-title" id="topbar-page-title">Dashboard</h1>
    <div class="topbar-actions">
      <span class="topbar-time" id="topbar-time"></span>
    </div>
  </header>

  <main class="content-area" id="main-content">
    <!-- 页面内容由 JS 动态渲染 -->
  </main>
</div>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-content"></div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast" aria-live="polite"></div>

<script src="../mock/mock-api.js"></script>
<script src="app.js"></script>
</body>
</html>
